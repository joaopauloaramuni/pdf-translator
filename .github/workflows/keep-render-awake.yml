name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_APP_URL }}")
          echo "Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "App is up."
          else
            echo "::warning::App responded with status $STATUS"
          fi
